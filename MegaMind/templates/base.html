<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MegaMind — Sistema inteligente de análise e geração de jogos da Mega-Sena">
    <title>{% block title %}MegaMind — Mega-Sena Pro{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top" id="main-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-stars"></i> <span class="brand-text">MegaMind</span>
                <span class="badge ms-2 badge-version"
                    style="background: linear-gradient(135deg, #d4a017, #c49000); color: #0a0f1a;">Mega-Sena 2.0</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
                            <i class="bi bi-graph-up"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'estatisticas' %}active{% endif %}"
                            href="/estatisticas">
                            <i class="bi bi-bar-chart-fill"></i> Estatísticas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'gerador_page' %}active{% endif %}"
                            href="/gerador">
                            <i class="bi bi-dice-6-fill"></i> Gerador
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'inteligencia_page' %}active{% endif %}"
                            href="/inteligencia">
                            <i class="bi bi-cpu-fill"></i> Inteligência
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'montecarlo' %}active{% endif %}"
                            href="/montecarlo">
                            <i class="bi bi-lightning-charge-fill text-warning"></i> Monte Carlo
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="atualizarDados()" title="Atualizar Dados">
                            <i class="bi bi-arrow-clockwise"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo -->
    <main class="container-fluid px-4 py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center py-3 mt-4" id="app-footer">
        <small class="text-muted">
            <i class="bi bi-stars"></i> MegaMind v2.0 — Motor de Inteligência LotoMind
            <span class="ms-3">Dados: Caixa Econômica Federal</span>
        </small>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>

</html>
