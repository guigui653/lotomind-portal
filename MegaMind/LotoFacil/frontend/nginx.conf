server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── API: Python Analysis (more specific prefix first) ────
    location /api/v1/analysis/ {
        proxy_pass http://lotomind-python:8000/api/v1/analysis/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── API: Python Prediction ───────────────────────────────
    location /api/v1/generate-prediction {
        proxy_pass http://lotomind-python:8000/api/v1/generate-prediction;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API: Python Predictions List & Create ────────────────
    location /api/v1/predictions {
        proxy_pass http://lotomind-python:8000/api/v1/predictions;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API: Python Last Update ───────────────────────────────
    location /api/v1/last-update {
        proxy_pass http://lotomind-python:8000/api/v1/last-update;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API: Python Sync Results ─────────────────────────────
    location /api/v1/sync-results {
        proxy_pass http://lotomind-python:8000/api/v1/sync-results;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    # ── API: Python Consultant (Analyze My Game) ─────────────
    location /api/v1/analyze-my-game {
        proxy_pass http://lotomind-python:8000/api/v1/analyze-my-game;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── API: Java Backend (auth, lottery, etc.) ──────────────
    location /api/v1/ {
        proxy_pass http://lotomind-java:8080/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── SPA Fallback ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
