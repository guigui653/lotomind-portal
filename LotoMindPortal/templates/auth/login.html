<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LotoMind — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="bi bi-stars"></i>
                <h1>LotoMind</h1>
                <p>Portal Privado de Análise</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} small py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">
                        <i class="bi bi-envelope"></i> E-mail
                    </label>
                    <input type="email" name="email" class="form-control form-control-lg"
                           placeholder="seu@email.com" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">
                        <i class="bi bi-lock"></i> Senha
                    </label>
                    <input type="password" name="password" class="form-control form-control-lg"
                           placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <div class="form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="form-check-label small text-muted" for="remember">
                            Lembrar-me neste dispositivo
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-shield-lock"></i> Entrar
                </button>
            </form>

            <div class="auth-footer">
                <i class="bi bi-lock-fill"></i> Acesso restrito — Autenticação obrigatória
            </div>
        </div>
    </div>
</body>
</html>
